version: '1.0'
name: ci-pipeline
displayName: CIPipeline
triggers:
  trigger: manual
  push:
    branches:
      include:
        - master
stages:
  - name: lint
    displayName: 代码检查
    strategy: naturally
    trigger: auto
    steps:
      - step: build@nodejs
        name: lint_typescript
        displayName: TypeScript Lint & TypeCheck
        nodeVersion: 22.22.0
        commands:
          - npm config set registry https://registry.npmmirror.com
          - cd frontend
          - npm install
          - npm run lint
          - npm run typecheck
        caches:
          - ~/.npm
        notify: []
        strategy:
          retry: '0'
      - step: build@golang
        name: lint_golang
        displayName: Go Lint
        golangVersion: '1.24'
        commands:
          - export GOPROXY=https://goproxy.cn
          - go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
          - export PATH="$HOME/go/bin:$PATH"
          - cd backend
          - golangci-lint run ./...
        caches:
          - /go/pkg/mod
        notify: []
        strategy:
          retry: '0'
  - name: build
    displayName: 构建前端
    strategy: naturally
    trigger: auto
    steps:
      - step: build@nodejs
        name: build_frontend
        displayName: 构建前端
        nodeVersion: 22.22.0
        commands:
          - npm config set registry https://registry.npmmirror.com
          - cd frontend
          - npm install && npm run build
        artifacts:
          - name: FRONTEND_ARTIFACT
            path:
              - frontend/out
        caches:
          - ~/.npm
        notify: []
        strategy:
          retry: '0'
  - name: stage-a5c73f08
    displayName: 构建后端
    strategy: naturally
    trigger: auto
    executor: []
    steps:
      - step: build@golang
        name: build_backend
        displayName: 构建后端
        golangVersion: '1.24'
        dependArtifact: FRONTEND_ARTIFACT
        commands:
          - export GOPROXY=https://goproxy.cn
          - curl -o frontend_artifact.tar.gz "$FRONTEND_ARTIFACT"
          - tar -xzf frontend_artifact.tar.gz
          - mkdir -p backend/internal/web/dist
          - cp -r out/* backend/internal/web/dist/
          - ls -la backend/internal/web/dist/
          - cd backend
          - CGO_ENABLED=0 go build -tags embed -ldflags="-s -w" -o bin/server ./cmd/server
          - cp ../deploy/.env.example bin/
        artifacts:
          - name: BACKEND_ARTIFACT
            path:
              - backend/bin
        caches:
          - /go/pkg/mod
        notify: []
        strategy:
          retry: '0'
  - name: publish
    displayName: 上传制品
    strategy: naturally
    trigger: auto
    executor: []
    steps:
      - step: publish@general_artifacts
        name: publish_backend
        displayName: 上传后端制品
        dependArtifact: BACKEND_ARTIFACT
        artifactName: oa-nsdiy
        notify: []
        strategy:
          retry: '0'
