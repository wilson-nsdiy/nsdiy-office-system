version: '1.0'
name: branch-pipeline
displayName: BranchPipeline
triggers:
  trigger: manual
  push:
    branches:
      include:
        - '**'
      exclude:
        - master
stages:
  - name: compile
    displayName: 编译检查
    strategy: naturally
    trigger: auto
    steps:
      - step: build@general
        name: build_go_backend
        displayName: Go 后端编译检查
        image: golang:1.25-alpine
        commands:
          - export GOPROXY=https://goproxy.cn,direct
          - cd backend
          - go mod tidy
          - go vet ./...
          - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o /dev/null ./cmd/server
        caches:
          - ~/go/pkg/mod
          - ~/.cache/go-build
        notify: []
        strategy:
          retry: '0'
      - step: build@nodejs
        name: build_nextjs_frontend
        displayName: Next.js 前端编译检查
        nodeVersion: 22.22.0
        commands:
          - npm config set registry https://registry.npmmirror.com
          - cd frontend
          - npm ci
          - npm run build
        caches:
          - ~/.npm
        notify: []
        strategy:
          retry: '0'
