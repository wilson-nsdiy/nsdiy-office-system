version: '1.0'
name: master-pipeline
displayName: MasterPipeline
triggers:
  trigger: manual
  push:
    branches:
      include:
        - master
stages:
  - name: build
    displayName: 构建前端
    strategy: naturally
    trigger: auto
    steps:
      - step: build@nodejs
        name: build_nodejs
        displayName: 构建前端
        nodeVersion: 22.22.0
        commands:
          - npm config set registry https://registry.npmmirror.com
          - cd frontend
          - npm install && npm run build
        artifacts:
          - name: FRONTEND_ARTIFACT
            path:
              - frontend/out
        caches:
          - ~/.npm
        notify: []
        strategy:
          retry: '0'
  - name: build_backend
    displayName: 后端编译
    strategy: naturally
    trigger: auto
    executor: []
    steps:
      - step: build@golang
        name: build_golang
        displayName: build_backend
        golangVersion: '1.24'
        dependArtifact: FRONTEND_ARTIFACT
        commands:
          - export GOPROXY=https://goproxy.cn
          - mkdir -p backend/internal/web/dist
          - cp -r frontend/out/* backend/internal/web/dist/
          - cd backend
          - CGO_ENABLED=0 go build -tags embed -ldflags="-s -w" -o bin/server ./cmd/server
        artifacts:
          - name: BACKEND_ARTIFACT
            path:
              - ./bin
        caches:
          - /go/pkg/mod
        notify: []
        strategy:
          retry: '0'
  - name: publish
    displayName: 上传制品
    strategy: naturally
    trigger: auto
    executor: []
    steps:
      - step: publish@general_artifacts
        name: publish_backend
        displayName: 上传后端制品
        dependArtifact: BACKEND_ARTIFACT
        artifactName: backend
        notify: []
        strategy:
          retry: '0'
