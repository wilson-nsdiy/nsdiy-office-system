version: '1.0'
name: master-pipeline
displayName: MasterPipeline
triggers:
  trigger: manual
  push:
    branches:
      include:
        - master
stages:
  - name: build
    displayName: 构建并嵌入前端
    strategy: naturally
    trigger: auto
    steps:
      - step: build@nodejs
        name: build_nodejs
        displayName: 构建前端
        nodeVersion: 22.22.0
        commands:
          - '# 设置NPM源，提升安装速度'
          - npm config set registry https://registry.npmmirror.com
          - ''
          - '# 进入前端目录执行构建 (本仓库为 monorepo，package.json 在 frontend/)'
          - cd frontend
          - '# 使用 npm ci 保证与 package-lock.json 一致'
          - npm ci && npm run build
          - ''
          - '# 将前端产物复制到后端 embed 目录'
          - mkdir -p ../backend/internal/web/dist
          - cp -r out/* ../backend/internal/web/dist/
        caches:
          - ~/.npm
        notify: []
        strategy:
          retry: '0'
      - step: build@golang
        name: build_golang
        displayName: 构建后端 (嵌入前端)
        golangVersion: '1.25'
        commands:
          - '# 默认使用goproxy.cn'
          - export GOPROXY=https://goproxy.cn
          - '# 进入后端目录执行构建，使用 embed tag 嵌入前端'
          - cd backend
          - go build -tags embed -o bin/server ./cmd/server
        artifacts:
          - name: BACKEND_ARTIFACT
            path:
              - ./backend/bin
        caches:
          - /go/pkg/mod
        notify: []
        strategy:
          retry: '0'
  - name: publish
    displayName: 上传制品
    strategy: naturally
    trigger: auto
    executor: []
    steps:
      # 上传后端制品 (已包含嵌入的前端)
      - step: publish@general_artifacts
        name: publish_backend
        displayName: 上传后端制品
        dependArtifact: BACKEND_ARTIFACT
        artifactName: backend
        notify: []
        strategy:
          retry: '0'
