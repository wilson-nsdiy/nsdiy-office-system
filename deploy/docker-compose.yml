# =============================================================================
# OA-NSDIY Docker Compose Configuration (Single Image)
# =============================================================================
# Quick Start:
#   1. cp config.example.yaml config.yaml && 修改 config.yaml 中的 jwt.secret
#   2. docker-compose up -d
#   3. Access: http://localhost:3001
#
# 配置文件通过 CONFIG_PATH 启动参数传入:
#   CONFIG_PATH=/app/config.yaml (容器内路径，需要 volume 挂载)
# =============================================================================

services:
  oa-nsdiy:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        VERSION: ${VERSION:-dev}
    image: oa-nsdiy:latest
    container_name: oa-nsdiy
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-3001}:3001"
    environment:
      - CONFIG_PATH=/app/config.yaml
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-q", "-T", "5", "-O", "/dev/null", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  data:
    driver: local
