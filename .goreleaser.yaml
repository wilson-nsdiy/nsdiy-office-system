version: 2

project_name: oa-nsdiy

before:
  hooks:
    - go mod tidy -C backend

builds:
  - id: oa-nsdiy
    dir: backend
    main: ./cmd/server
    binary: oa-nsdiy
    flags:
      - -tags=embed
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
    goarch:
      - amd64
    ignore: []
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
      - -X main.Commit={{.Commit}}
      - -X main.Date={{.Date}}
      - -X main.BuildType=release

archives:
  - id: default
    format: tar.gz
    name_template: >-
      {{ .ProjectName }}_v{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE*
      - README*
      - deploy/.env.example

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

changelog:
  disable: true

release:
  github:
    owner: "{{ .Env.GITHUB_REPO_OWNER }}"
    name: "{{ .Env.GITHUB_REPO_NAME }}"
  draft: false
  prerelease: auto
  name_template: "OA-NSDIY v{{.Version}}"
  header: |
    > OA-NSDIY - Studio OA Management System

    {{ .Env.TAG_MESSAGE }}

  footer: |

    ---

    ## Installation

    **One-line install (Linux):**

    Production recommended (root mode):
    ```bash
    curl -sSL https://raw.githubusercontent.com/{{ .Env.GITHUB_REPO_OWNER }}/{{ .Env.GITHUB_REPO_NAME }}/master/deploy/install.sh | sudo bash
    ```

    Dev/test (no sudo needed):
    ```bash
    curl -sSL https://raw.githubusercontent.com/{{ .Env.GITHUB_REPO_OWNER }}/{{ .Env.GITHUB_REPO_NAME }}/master/deploy/install.sh | bash -s -- --user
    ```

    **Manual download:**
    Download the appropriate archive for your platform from the assets below.
